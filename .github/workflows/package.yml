name: package

on:
  push:
    paths:
      - "pyproject.toml"
      - "src/**"
      - "configs/**"
      - "README.md"
      - "LICENSE"
      - ".github/workflows/package.yml"
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/**"
      - "configs/**"
      - "README.md"
      - "LICENSE"
      - ".github/workflows/package.yml"

jobs:
  build-and-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build frontend
        run: python -m pip install build
      - name: Build source and wheel distributions
        run: python -m build
      - name: Install built wheel
        run: python -m pip install dist/*.whl
      - name: Check console script
        run: |
          lrdbench list-metrics
          lrdbench list-estimators
          lrdbench list-suites
          lrdbench validate public_small_canonical_ground_truth
          lrdbench run smoke_ground_truth | tee run.out
          run_dir=$(grep '^result_store=' run.out | cut -d= -f2-)
          lrdbench validate-output "$run_dir"
          python -c "from lrdbench.testing import estimator_spec; from lrdbench.examples.custom_estimator import build_variance_ratio_estimator; build_variance_ratio_estimator(estimator_spec(name='VarianceRatio'))"
