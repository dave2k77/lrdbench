# Baseline benchmark: RS (Hurst proxy on fGn) + GPH (long-memory d on ARFIMA(0,d,0)).
# RS is evaluated with truth-backed metrics on fGn only; GPH on ARFIMA only.
# Both estimators still run on every series (incompatible pairs skip bias/mae/rmse/coverage).

manifest_id: bench_rs_gph_v1
name: baseline_estimators_rs_gph
description: Small benchmark grid for implemented RS and GPH estimators.
mode: ground_truth
source:
  type: generator_grid
  generators:
    - family: fGn
      params:
        H: [0.4, 0.5, 0.6]
        n: [512]
        sigma: [1.0]
      replicates: 2
    - family: ARFIMA
      params:
        d: [0.25, 0.4]
        n: [512]
        sigma: [1.0]
      replicates: 2
estimators:
  - name: RS
    family: time_domain
    target_estimand: hurst_scaling_proxy
    supports_ci: true
    params:
      n_bootstrap: 96
      bootstrap_block_len: 32
      ci_levels: [0.95]
  - name: GPH
    family: spectral
    target_estimand: long_memory_parameter
    supports_ci: true
    params:
      n_bootstrap: 96
      bootstrap_block_len: 32
      ci_levels: [0.95]
metrics:
  - bias
  - mae
  - rmse
  - validity_rate
  - runtime
  - name: coverage
    levels: [0.95]
  - name: ci_width
    levels: [0.95]
  - name: coverage_error
    levels: [0.95]
leaderboards:
  - name: overall
    mode: ground_truth
    component_metrics: [mae, validity_rate, runtime]
    weights:
      mae: 0.45
      validity_rate: 0.35
      runtime: 0.2
    ranking_rule: weighted_rank
    tie_break_rule: best_primary_metric
report:
  formats: [html, csv]
  export_root: reports
seeds:
  global_seed: 2026
execution:
  max_workers: 4
