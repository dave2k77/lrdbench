manifest_id: public_small_sensitivity_disagreement_v1
name: public_small_sensitivity_disagreement
description: Tutorial-scale sensitivity suite for estimator scale/window choices and disagreement.
mode: ground_truth
source:
  type: generator_grid
  generators:
    - family: fGn
      params:
        H: [0.5, 0.7]
        n: [512]
        sigma: [1.0]
      replicates: 2
estimators:
  - name: DFA
    family: time_domain
    target_estimand: hurst_scaling_proxy
    supports_ci: false
    params:
      detrend_order: 1
    variants:
      - name: short_scales
        params:
          min_scale: 8
          max_scale: 96
      - name: long_scales
        params:
          min_scale: 16
          max_scale: 160
  - name: DMA
    family: time_domain
    target_estimand: hurst_scaling_proxy
    supports_ci: false
    variants:
      - name: short_windows
        params:
          min_scale: 8
          max_scale: 96
      - name: long_windows
        params:
          min_scale: 16
          max_scale: 160
  - name: WaveletOLS
    family: wavelet
    target_estimand: hurst_scaling_proxy
    supports_ci: false
    variants:
      - name: broad_band
        params:
          wavelet: db2
          j_drop_low: 1
          j_drop_high: 1
      - name: upper_band
        params:
          wavelet: db2
          j_drop_low: 2
          j_drop_high: 1
metrics:
  - bias
  - mae
  - rmse
  - validity_rate
  - runtime
  - cross_estimator_dispersion
  - pairwise_estimator_disagreement
  - parameter_variant_sensitivity
  - max_variant_drift
leaderboards:
  - name: sensitivity_accuracy
    mode: ground_truth
    component_metrics: [mae, validity_rate, runtime]
    weights:
      mae: 0.6
      validity_rate: 0.25
      runtime: 0.15
    ranking_rule: weighted_rank
    tie_break_rule: mae
uncertainty:
  enabled: true
  n_bootstrap: 100
  ci_levels: [0.95]
  seed: 20260429
  metrics: [mae, parameter_variant_sensitivity, max_variant_drift]
report:
  formats: [html, csv, latex]
  export_root: reports/public_small
  figure_set:
    - disagreement_heatmap
    - sensitivity_heatmap
    - benchmark_uncertainty_intervals
seeds:
  global_seed: 20260429
execution:
  max_workers: 2
