manifest_id: paper_sensitivity_disagreement_v1
name: paper_sensitivity_disagreement
description: Truth-free sensitivity and estimator-disagreement suite for plausible scale/window choices.
mode: ground_truth
source:
  type: generator_grid
  generators:
    - family: fGn
      params:
        H: [0.35, 0.5, 0.65, 0.8]
        n: [512, 1024]
        sigma: [1.0]
      replicates: 3
    - family: MRW
      params:
        H: [0.5, 0.7]
        n: [512, 1024]
        sigma: [1.0]
        lambda2: [0.02, 0.08]
      replicates: 3
estimators:
  - name: DFA
    family: time_domain
    target_estimand: hurst_scaling_proxy
    assumptions: [scaling_range_stability]
    supports_ci: false
    params:
      detrend_order: 1
    variants:
      - name: short_scales
        params:
          min_scale: 8
          max_scale: 64
      - name: mid_scales
        params:
          min_scale: 16
          max_scale: 128
      - name: long_scales
        params:
          min_scale: 32
          max_scale: 256
  - name: DMA
    family: time_domain
    target_estimand: hurst_scaling_proxy
    assumptions: [scaling_range_stability]
    supports_ci: false
    variants:
      - name: short_windows
        params:
          min_scale: 8
          max_scale: 64
      - name: mid_windows
        params:
          min_scale: 16
          max_scale: 128
      - name: long_windows
        params:
          min_scale: 32
          max_scale: 256
  - name: WaveletOLS
    family: wavelet
    target_estimand: hurst_scaling_proxy
    assumptions: [dyadic_scaling]
    supports_ci: false
    params:
      wavelet: db4
    variants:
      - name: fine_band
        params:
          j_drop_low: 1
          j_drop_high: 2
      - name: balanced_band
        params:
          j_drop_low: 2
          j_drop_high: 2
      - name: coarse_band
        params:
          j_drop_low: 2
          j_drop_high: 1
metrics:
  - bias
  - mae
  - rmse
  - validity_rate
  - runtime
  - cross_estimator_dispersion
  - pairwise_estimator_disagreement
  - family_level_disagreement
  - parameter_variant_sensitivity
  - max_variant_drift
leaderboards:
  - name: sensitivity_stability
    mode: ground_truth
    component_metrics: [mae, parameter_variant_sensitivity, max_variant_drift, validity_rate]
    weights:
      mae: 0.3
      parameter_variant_sensitivity: 0.3
      max_variant_drift: 0.25
      validity_rate: 0.15
    ranking_rule: weighted_rank
    tie_break_rule: parameter_variant_sensitivity
uncertainty:
  enabled: true
  n_bootstrap: 300
  ci_levels: [0.95]
  seed: 20260424
  metrics: [mae, parameter_variant_sensitivity, max_variant_drift]
  paired: true
  paired_metrics: [mae]
report:
  formats: [html, csv, latex]
  include_provenance: true
  export_root: reports/paper
  figure_set:
    - disagreement_heatmap
    - sensitivity_heatmap
    - benchmark_uncertainty_intervals
seeds:
  global_seed: 20260424
execution:
  max_workers: 4
  estimate_cache_dir: .lrdbench_cache/paper_sensitivity
  cache_read: true
  cache_write: true
