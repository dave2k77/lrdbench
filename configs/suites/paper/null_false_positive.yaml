manifest_id: paper_null_false_positive_v1
name: paper_null_false_positive
description: Null suite for estimating false-positive LRD rates at short-memory boundary cases.
mode: ground_truth
source:
  type: generator_grid
  generators:
    - family: fGn
      params:
        H: [0.5]
        n: [512, 1024]
        sigma: [1.0]
      replicates: 10
    - family: ARFIMA
      params:
        d: [0.0]
        n: [512, 1024]
        sigma: [1.0]
      replicates: 10
estimators:
  - name: RS
    family: time_domain
    target_estimand: hurst_scaling_proxy
    assumptions: [stationary_increments, finite_variance]
    supports_ci: true
    params:
      n_bootstrap: 64
      bootstrap_block_len: 32
      ci_levels: [0.95]
  - name: DFA
    family: time_domain
    target_estimand: hurst_scaling_proxy
    assumptions: [scaling_range_stability]
    supports_ci: false
    params:
      min_scale: 16
      max_scale: 256
      detrend_order: 1
  - name: GPH
    family: spectral
    target_estimand: long_memory_parameter
    assumptions: [stationary, gaussian_like]
    supports_ci: true
    params:
      n_bootstrap: 64
      bootstrap_block_len: 32
      ci_levels: [0.95]
  - name: Periodogram
    family: spectral
    target_estimand: long_memory_parameter
    assumptions: [stationary, spectral_scaling]
    supports_ci: false
    params:
      m: 64
  - name: ModifiedLocalWhittle
    family: spectral
    target_estimand: long_memory_parameter
    assumptions: [stationary, spectral_scaling]
    supports_ci: false
    params:
      m: 64
metrics:
  - bias
  - mae
  - rmse
  - false_positive_lrd_rate
  - validity_rate
  - runtime
  - cross_estimator_dispersion
  - pairwise_estimator_disagreement
  - family_level_disagreement
  - name: coverage
    levels: [0.95]
  - name: ci_width
    levels: [0.95]
  - name: coverage_error
    levels: [0.95]
leaderboards:
  - name: null_specificity
    mode: ground_truth
    component_metrics: [false_positive_lrd_rate, validity_rate, runtime]
    weights:
      false_positive_lrd_rate: 0.6
      validity_rate: 0.25
      runtime: 0.15
    ranking_rule: weighted_rank
    tie_break_rule: false_positive_lrd_rate
uncertainty:
  enabled: true
  n_bootstrap: 300
  ci_levels: [0.95]
  seed: 20260423
  metrics: [false_positive_lrd_rate, validity_rate]
  paired: true
  paired_metrics: [false_positive_lrd_rate]
report:
  formats: [html, csv, latex]
  include_provenance: true
  export_root: reports/paper
  figure_set:
    - false_positive_lrd
    - disagreement_heatmap
    - benchmark_uncertainty_intervals
seeds:
  global_seed: 20260423
execution:
  max_workers: 4
  estimate_cache_dir: .lrdbench_cache/paper_null
  cache_read: true
  cache_write: true
