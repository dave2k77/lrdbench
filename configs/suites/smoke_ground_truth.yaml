manifest_id: smoke_gt_v1
name: smoke_ground_truth
description: Tiny Phase 1 smoke benchmark for CI and local checks.
mode: ground_truth
source:
  type: generator_grid
  generators:
    - family: fGn
      params:
        H: [0.5]
        n: [128]
        sigma: [1.0]
      replicates: 1
estimators:
  - name: RS
    family: time_domain
    target_estimand: hurst_scaling_proxy
    supports_ci: true
    params:
      n_bootstrap: 48
      bootstrap_block_len: 12
      ci_levels: [0.95]
metrics:
  - bias
  - mae
  - rmse
  - validity_rate
  - runtime
  - name: coverage
    levels: [0.95]
  - name: ci_width
    levels: [0.95]
  - name: coverage_error
    levels: [0.95]
leaderboards:
  - name: accuracy
    mode: ground_truth
    component_metrics: [mae, coverage_error, validity_rate, runtime]
    weights:
      mae: 0.4
      coverage_error: 0.25
      validity_rate: 0.2
      runtime: 0.15
    ranking_rule: weighted_rank
    tie_break_rule: mae
report:
  formats: [html, csv, latex]
  include_provenance: true
  export_root: reports
seeds:
  global_seed: 42
